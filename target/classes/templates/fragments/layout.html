<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Projet ID3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/png" th:href="@{/img/32132.png?v=3}">
</head>

<body>

<header th:fragment="header(active)" class="site-header">
    <div class="header-inner">
        <a th:href="@{/}" class="brand">
            <img th:src="@{/img/32132.png?v=3}" alt="UMP - FSO Oujda" class="brand-logo">
            <div class="brand-text">
                <span class="brand-title">ID3 · Nursery (UCI)</span>
                <span class="brand-sub">Master M2I · Data Mining</span>
            </div>
        </a>
        <nav class="main-nav">
            <a th:href="@{/}" th:classappend="${active == 'accueil'} ? ' active'">Accueil</a>
            <a th:href="@{/apprentissage}" th:classappend="${active == 'apprentissage'} ? ' active'">Apprentissage</a>
            <a th:href="@{/prediction}" th:classappend="${active == 'prediction'} ? ' active'">Prediction</a>
            <a th:href="@{/evaluation}" th:classappend="${active == 'evaluation'} ? ' active'">Evaluation</a>
        </nav>
    </div>
</header>

<footer th:fragment="footer" class="site-footer">
    <div class="footer-inner">
        <div class="footer-block">
            <strong>Universite Mohammed Premier</strong>
            <span>Faculte des Sciences · Oujda</span>
        </div>
        <div class="footer-block">
            <strong>Master M2I</strong>
            <span>Data Mining 2025/2026</span>
        </div>
        <div class="footer-block">
            <strong>Encadrement</strong>
            <span>Pr. Azzeddine Mazroui</span>
        </div>
        <div class="footer-block">
            <strong>Binome</strong>
            <span>Ghayout Amine · Boubechrie Rida</span>
        </div>
    </div>
</footer>

<script th:fragment="scripts" th:src="@{/js/app.js}"></script>

</body>
</html>
